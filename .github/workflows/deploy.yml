name: Build & Deploy

on:
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Tina credentials
        run: |
          if [ -z "$TINA_CLIENT_ID" ]; then
            echo "ERROR: TINA_CLIENT_ID is not set"
            exit 1
          fi
          if [ -z "$TINA_TOKEN" ]; then
            echo "ERROR: TINA_TOKEN is not set"
            exit 1
          fi
          echo "✓ Both Tina credentials are present"
        env:
          TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}

      - name: Build (Tina + Astro)
        run: npm run build:ci
        env:
          TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Test SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -v -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} "echo 'SSH connection successful'"

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v6
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: ${{ secrets.USERNAME }}
          SOURCE: dist/
          TARGET: ${{ secrets.DEPLOY_PATH }}
          # Sync and prune files removed from dist/
          ARGS: -rlgoDzvc --delete
          # Don't overwrite the server's .htaccess
          EXCLUDE: ".htaccess"

  notify-bluesky:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth 2 ensures HEAD~1 is available for the git diff
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Post new content to Bluesky
        run: node .github/scripts/notify-bluesky.mjs
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          SITE_URL: ${{ secrets.SITE_URL }}
